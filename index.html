<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday, My Favorite Person</title>
    
    <!-- Scripts -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        /* ── RESPONSIVE CHANGE: allow body to scroll on mobile so Screen 5 is fully reachable ── */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow-x: hidden;
            overflow-y: auto;
            font-family: 'Outfit', sans-serif;
            background: #1a000d;
        }

        .bg-gradient {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #2d001a 0%, #4d0033 50%, #1a000d 100%);
            z-index: -1;
        }

        .glass {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }

        .text-gradient {
            background: linear-gradient(to right, #ff80b3, #ffb3d9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        .slide-up { animation: slideUp 0.8s ease-out forwards; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        @keyframes floatHeart {
            0%   { transform: translateY(110vh) rotate(0deg);   opacity: 0; }
            10%  { opacity: 0.4; }
            90%  { opacity: 0.4; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        .floating-heart {
            position: absolute; pointer-events: none;
            animation: floatHeart var(--duration) linear infinite;
            left: var(--left); opacity: 0;
        }

        .glow-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glow-btn:hover {
            box-shadow: 0 0 20px rgba(236, 72, 153, 0.5);
            transform: scale(1.05);
        }

        #heart-container {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        /* ── RESPONSIVE CHANGE: Screen 5 glass card — 80vh max-height so mobile users can scroll ── */
        .final-scroll {
            max-height: 80vh;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(236,72,153,0.4) transparent;
        }
        .final-scroll::-webkit-scrollbar { width: 4px; }
        .final-scroll::-webkit-scrollbar-thumb { background: rgba(236,72,153,0.4); border-radius: 4px; }

        /* ── RESPONSIVE CHANGE: safe padding for screens with notches / bottom bars ── */
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 16px); }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div id="heart-container"></div>
    <div id="root"></div>

    <audio id="bg-music" loop src="ytmp3free.cc_khat-navjot-ahuja-aesthetic-lyrical-video-navjotahuja-khat-shorts-youtubemp3free.org.mp3"></audio>

    <script>
        // Vanilla JS hearts — rendered immediately so the page is never blank
        const container = document.getElementById('heart-container');
        for (let i = 0; i < 18; i++) {
            const heart = document.createElement('div');
            heart.className = 'floating-heart';
            const size = Math.random() * 22 + 14;
            heart.innerHTML = `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="#ff1a8c"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`;
            heart.style.setProperty('--left', `${Math.random() * 100}%`);
            heart.style.setProperty('--duration', `${Math.random() * 10 + 15}s`);
            heart.style.animationDelay = `${Math.random() * 12}s`;
            container.appendChild(heart);
        }
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Small inline SVG icon helper
        const Icon = ({ name }) => {
            const map = {
                heart:  <path strokeLinecap="round" strokeLinejoin="round" d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" />,
                smile:  <><circle cx="12" cy="12" r="10" /><path d="M8 14s1.5 2 4 2 4-2 4-2" /><line x1="9" x2="9.01" y1="9" y2="9" /><line x1="15" x2="15.01" y1="9" y2="9" /></>,
                brain:  <><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.78-3.06 2.5 2.5 0 0 1-2.41-4.23 2.5 2.5 0 0 1 .15-4.67A2.5 2.5 0 0 1 4.5 4.5V2h5Z" /><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.78-3.06 2.5 2.5 0 0 0 2.41-4.23 2.5 2.5 0 0 0-.15-4.67A2.5 2.5 0 0 0 19.5 4.5V2h-5Z" /></>,
                star:   <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />,
            };
            return (
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    {map[name]}
                </svg>
            );
        };

        const App = () => {
            const [step, setStep]       = useState(1);
            const [visible, setVisible] = useState(true);

            const goNext = () => {
                // Play audio on Screen 1 button click
                if (step === 1) {
                    document.getElementById('bg-music').play().catch(e => console.log('Audio play failed', e));
                }
                setVisible(false);
                setTimeout(() => { setStep(s => s + 1); setVisible(true); }, 450);
            };

            // Confetti on screen 5
            useEffect(() => {
                if (step !== 5) return;
                const end = Date.now() + 6000;
                (function frame() {
                    confetti({ particleCount: 3, angle: 60,  spread: 55, origin: { x: 0 }, colors: ['#ff1a8c', '#ffffff', '#ffd6eb'] });
                    confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#ff1a8c', '#ffffff', '#ffd6eb'] });
                    if (Date.now() < end) requestAnimationFrame(frame);
                }());
            }, [step]);

            return (
                /* ── RESPONSIVE CHANGE: min-h-screen + py-24 gives breathing room top/bottom on all devices ── */
                <div className="relative z-10 w-full min-h-screen flex flex-col items-center justify-center px-4 py-24 text-white safe-bottom">

                    {/* Progress bar */}
                    <div className="fixed top-6 sm:top-10 flex gap-2 z-50">
                        {[1,2,3,4,5].map(i => (
                            <div key={i} className={`h-1 w-6 sm:w-8 rounded-full transition-all duration-500 ${i <= step ? 'bg-pink-500 shadow-[0_0_10px_#ec4899]' : 'bg-white/10'}`} />
                        ))}
                    </div>

                    {/* Screens */}
                    <div className={`w-full flex flex-col items-center transition-all duration-450 transform ${visible ? 'opacity-100 scale-100' : 'opacity-0 scale-95'}`}>

                        {/* ── SCREEN 1 ── */}
                        {step === 1 && (
                            <div className="text-center space-y-8 fade-in w-full max-w-2xl mx-auto px-2">
                                <p className="text-pink-400 tracking-[0.3em] uppercase text-sm">Special Delivery For You</p>
                                <h1 className="text-4xl sm:text-5xl md:text-8xl font-black slide-up leading-tight">
                                    Hello <span className="text-gradient">My Sweet Potato</span>
                                </h1>
                                <button onClick={goNext} className="glow-btn px-8 sm:px-12 py-4 sm:py-5 bg-gradient-to-r from-pink-600 to-fuchsia-700 rounded-full font-bold text-base sm:text-xl flex items-center gap-3 mx-auto">
                                    UNWRAP MY FEELINGS
                                    <span className="text-white"><Icon name="heart" /></span>
                                </button>
                            </div>
                        )}

                        {/* ── SCREEN 2 ── */}
                        {step === 2 && (
                            <div className="text-center space-y-8 w-full max-w-2xl mx-auto px-2 fade-in">
                                <h2 className="text-3xl sm:text-4xl md:text-6xl font-bold leading-snug">
                                    To my precious one,{' '}
                                    <span className="text-pink-400">Happy Birthday</span>
                                </h2>
                                <p className="text-pink-100/60 text-base sm:text-lg leading-relaxed">
                                    Today is a celebration of the day the world became a brighter place because you were born.
                                </p>
                                <button onClick={goNext} className="glow-btn px-10 py-4 border border-pink-500/50 rounded-full font-bold">
                                    DISCOVER MORE
                                </button>
                            </div>
                        )}

                        {/* ── SCREEN 3 ── */}
                        {step === 3 && (
                            <div className="flex flex-col items-center space-y-10 w-full max-w-5xl mx-auto px-2 fade-in">
                                <h2 className="text-2xl sm:text-3xl md:text-4xl font-bold text-center">
                                    Reasons Why I <span className="text-gradient">Adore You</span>
                                </h2>
                                {/* ── RESPONSIVE CHANGE: 1 col on mobile, 3 on md+ ── */}
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-5 w-full">
                                    {[
                                        { t: "Infectious Laughter", d: "The way you laugh makes the whole world feel right. It is my favorite sound.", i: "smile"  },
                                        { t: "To Gentle Mind",      d: "Your unique perspective and kindness constantly inspire me to see beauty everywhere.", i: "brain"  },
                                        { t: "Gentle Soul",         d: "Your warmth knows no bounds. You make everyone around you feel safe and seen.", i: "star"   },
                                    ].map((r, idx) => (
                                        /* ── RESPONSIVE CHANGE: w-full max-w-md on mobile so cards never clip ── */
                                        <div key={idx} className="glass p-6 sm:p-8 rounded-[2rem] text-center space-y-4 w-full max-w-md mx-auto md:mx-0 md:max-w-none">
                                            <div className="text-pink-400 flex justify-center"><Icon name={r.i} /></div>
                                            <h3 className="font-bold text-xl">{r.t}</h3>
                                            <p className="text-pink-100/50 text-sm leading-relaxed">{r.d}</p>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={goNext} className="glow-btn px-10 py-4 bg-white/5 border border-white/10 rounded-full">
                                    REMEMBER OUR JOURNEY
                                </button>
                            </div>
                        )}

                        {/* ── SCREEN 4 ── */}
                        {step === 4 && (
                            <div className="text-center space-y-8 fade-in w-full max-w-md mx-auto px-2">
                                <h2 className="text-3xl sm:text-4xl font-bold">
                                    A Snapshot of <span className="text-gradient">Our Story</span>
                                </h2>
                                {/* ── RESPONSIVE CHANGE: w-full max-w-xs so photo card never overflows ── */}
                                <div className="relative glass p-4 rounded-[2rem] w-full max-w-xs h-96 mx-auto overflow-hidden group">
                                    {/* ── REPLACE THE URL BELOW WITH YOUR COUPLE PHOTO ── */}
                                    <img
                                        src="https://static.wikia.nocookie.net/e53a6673-0eac-4d02-8aeb-15bcfcaee375"
                                        alt="Us"
                                        className="w-full h-full object-cover rounded-[1.5rem] group-hover:scale-105 transition-transform duration-700"
                                    />
                                    <div className="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-transparent rounded-[1.5rem] flex items-end p-6">
                                        <p className="italic text-sm text-pink-100">Every moment with you is my favorite.</p>
                                    </div>
                                </div>
                                <button onClick={goNext} className="glow-btn px-10 py-4 bg-gradient-to-r from-pink-600 to-fuchsia-600 rounded-full font-bold">
                                    ONE FINAL THOUGHT
                                </button>
                            </div>
                        )}

                        {/* ── SCREEN 5 ── */}
                        {step === 5 && (
                            <div className="text-center space-y-8 w-full max-w-2xl mx-auto px-2 fade-in">
                                <div className="text-7xl animate-bounce">🎉</div>
                                <h2 className="text-3xl font-bold">My Deepest Wish For You</h2>

                                {/* ── RESPONSIVE CHANGE: max-h-[80vh] + overflow-y-auto so mobile users can scroll entire message ── */}
                                <div className="final-scroll glass rounded-[2rem] p-6 sm:p-8 text-left space-y-5 w-full max-w-md sm:max-w-2xl mx-auto">
                                    <p className="text-pink-100/80 leading-relaxed">
                                        I don't think a simple "Happy Birthday" is enough for you anymore 🎂✨
                                    </p>
                                    <p className="text-pink-100/80 leading-relaxed">
                                        Because you're not just someone in my life now… you've become a part of my everyday thoughts, my comfort, my happiness 💖🌙
                                    </p>
                                    <p className="text-pink-100/80 leading-relaxed">
                                        You make ordinary days feel special without even trying 🌸🤍
                                    </p>
                                    <p className="text-pink-100/80 leading-relaxed">
                                        And honestly, I'm just thankful that this world gave me you 🫶🏻✨
                                    </p>
                                    <hr className="border-pink-500/20" />
                                    <p className="text-pink-100/80 leading-relaxed">
                                        I hope this year brings you peace, success, soft moments, and every little thing your heart secretly wishes for 🌷💫
                                    </p>
                                    <p className="text-pink-100/80 leading-relaxed">
                                        Keep smiling the way you do, because it somehow makes everything feel okay 😊❤️
                                    </p>
                                    <p className="text-pink-100/80 leading-relaxed">
                                        And no matter what happens, I'll always be cheering for you quietly from my side 🤍🌍
                                    </p>
                                    <hr className="border-pink-500/20" />
                                    <p className="text-xl sm:text-2xl font-bold text-center text-white pt-2">
                                        Happy Birthday, my favorite person 🎉❤️🥹
                                    </p>
                                </div>
                            </div>
                        )}

                    </div>

                    {/* Bottom tag */}
                    <div className="fixed bottom-4 sm:bottom-8 text-white/20 text-[10px] tracking-[0.4em] uppercase">
                        Handcrafted for Ritu
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
